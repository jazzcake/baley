services:
  postgres:
    image: postgres:17.5-alpine
    environment:
      POSTGRES_DB: baley
      POSTGRES_USER: baley
      POSTGRES_PASSWORD: baley
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baley -d baley"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - baley-postgres:/var/lib/postgresql/data

volumes:
  baley-postgres:
